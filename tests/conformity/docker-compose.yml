# Conformity test bench for mad. Five containers on a single bridge
# network: one gateway running mad daemon + sshd, four Linux clients
# that join their respective groups via `mad tun join` over the
# embedded docker DNS.
#
# Two groups:
#   ga (10.77.10.0/24)  — alice, bob
#   gb (10.77.20.0/24)  — carol, dave
#
# Intra-group traffic should flow; inter-group traffic should NOT.

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    hostname: gateway
    container_name: madtest-gateway
    cap_add: [NET_ADMIN]
    # ip_forward must be on for L3 client-to-client routing through
    # the per-group bridges. Docker disables it inside containers by
    # default; the sysctl below flips it back on for this netns only.
    sysctls:
      net.ipv4.ip_forward: "1"
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - /root/mad:/mad:ro
      - ./keys:/init-keys:ro
    networks:
      madnet:
        ipv4_address: 10.99.0.10
    restart: unless-stopped

  alice:
    build:
      context: .
      dockerfile: Dockerfile.client
    hostname: alice
    container_name: madtest-alice
    cap_add: [NET_ADMIN]
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - /root/mad:/mad:ro
      - ./keys:/init-keys:ro
    networks:
      madnet:
        ipv4_address: 10.99.0.20
    environment:
      MAD_USER: alice
      MAD_GROUP: ga
      MAD_MODE: l3
    depends_on: [gateway]

  bob:
    build:
      context: .
      dockerfile: Dockerfile.client
    hostname: bob
    container_name: madtest-bob
    cap_add: [NET_ADMIN]
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - /root/mad:/mad:ro
      - ./keys:/init-keys:ro
    networks:
      madnet:
        ipv4_address: 10.99.0.21
    environment:
      MAD_USER: bob
      MAD_GROUP: ga
      MAD_MODE: l3
    depends_on: [gateway]

  carol:
    build:
      context: .
      dockerfile: Dockerfile.client
    hostname: carol
    container_name: madtest-carol
    cap_add: [NET_ADMIN]
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - /root/mad:/mad:ro
      - ./keys:/init-keys:ro
    networks:
      madnet:
        ipv4_address: 10.99.0.30
    environment:
      MAD_USER: carol
      MAD_GROUP: gb
      MAD_MODE: l3
    depends_on: [gateway]

  dave:
    build:
      context: .
      dockerfile: Dockerfile.client
    hostname: dave
    container_name: madtest-dave
    cap_add: [NET_ADMIN]
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - /root/mad:/mad:ro
      - ./keys:/init-keys:ro
    networks:
      madnet:
        ipv4_address: 10.99.0.31
    environment:
      MAD_USER: dave
      MAD_GROUP: gb
      MAD_MODE: l3
    depends_on: [gateway]

  # Windows-in-docker via dockurr/windows. Disabled by default — it
  # provisions an actual Windows VM via QEMU inside the container,
  # which takes ~30 minutes on first run (ISO download + install).
  # Enable with: `docker compose --profile windows up -d`
  # After boot, RDP to localhost:3389 to drive the install / mad
  # client setup. Requires /dev/kvm + nested virtualization on the
  # LXC host (sysctl + kvm-nested module on the proxmox bare metal).
  windows:
    image: dockurr/windows:latest
    container_name: madtest-windows
    profiles: [windows]
    environment:
      VERSION: "11"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "40G"
      USERNAME: "rene"
      PASSWORD: "madtest"
    devices:
      - "/dev/kvm:/dev/kvm"
      - "/dev/net/tun:/dev/net/tun"
    cap_add: [NET_ADMIN]
    ports:
      - "3389:3389/tcp"   # RDP
      - "3389:3389/udp"   # RDP
      - "8006:8006"       # web viewer
    volumes:
      - /root/mad:/mad:ro
      - ./keys:/init-keys:ro
      - madwin-data:/storage
    networks:
      madnet:
        ipv4_address: 10.99.0.40
    stop_grace_period: 2m

volumes:
  madwin-data:

networks:
  madnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.0.0/24
